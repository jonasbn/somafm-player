name: tag-release-goreleaser

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-darwin-amd64:
    runs-on: macos-15-intel
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          version: latest
          args: build --single-target --id darwin-amd64 --clean --output ./somafm-player
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: amd64
      - name: Package archive
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          mkdir -p release-assets
          tar -czf "release-assets/somafm-player_${version}_darwin_amd64.tar.gz" somafm-player
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: release-darwin-amd64
          path: release-assets/
          retention-days: 1

  build-darwin-arm64:
    runs-on: macos-14
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          version: latest
          args: build --single-target --id darwin-arm64 --clean --output ./somafm-player
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
      - name: Package archive
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          mkdir -p release-assets
          tar -czf "release-assets/somafm-player_${version}_darwin_arm64.tar.gz" somafm-player
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: release-darwin-arm64
          path: release-assets/
          retention-days: 1

  release:
    needs: [build-darwin-amd64, build-darwin-arm64]
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          pattern: release-darwin-*
          path: release-assets/
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          shasum -a 256 ./*.tar.gz | sed 's#\./##' > checksums.txt
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            release-assets/*.tar.gz \
            release-assets/checksums.txt \
            --title "$TAG" \
            --generate-notes \
            --notes "See [CHANGELOG.md](https://github.com/jonasbn/somafm-player/blob/main/CHANGELOG.md) for the full curated changelog."
